services:
  database:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bri_tool}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Isi POSTGRES_PASSWORD di file .env}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - britoel_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bri_tool}"]
      interval: 5s
      timeout: 5s
      retries: 20

  setup:
    build:
      context: .
      target: builder
    restart: "no"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-bri_tool}
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-bri_tool}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://127.0.0.1:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Isi BETTER_AUTH_SECRET di file .env}
      BETTER_AUTH_ALLOW_SIGNUP: "false"
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Administrator BRI Tool}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@britoel.local}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-8014-SUPERADMIN}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?Isi SEED_ADMIN_PASSWORD di file .env}
    command: ["sh", "-c", "pnpm db:migrate && pnpm db:seed"]
    depends_on:
      database:
        condition: service_healthy

  app:
    build:
      context: .
      target: runner
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-bri_tool}
      DIRECT_DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-bri_tool}
      STORAGE_DRIVER: local
      LOCAL_STORAGE_ROOT: /app/data/uploads
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://127.0.0.1:3000}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Isi BETTER_AUTH_SECRET di file .env}
      BETTER_AUTH_ALLOW_SIGNUP: ${BETTER_AUTH_ALLOW_SIGNUP:-false}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Administrator BRI Tool}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@britoel.local}
      SEED_ADMIN_USERNAME: ${SEED_ADMIN_USERNAME:-8014-SUPERADMIN}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:?Isi SEED_ADMIN_PASSWORD di file .env}
      WHATSAPP_SEND_MODE: ${WHATSAPP_SEND_MODE:-simulation}
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - britoel_uploads:/app/data/uploads
    depends_on:
      setup:
        condition: service_completed_successfully
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  britoel_postgres:
  britoel_uploads:
